name: Security Audit

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    # Weekly, Monday 06:00 UTC — catches newly-disclosed CVEs in existing deps.
    - cron: '0 6 * * 1'

permissions:
  contents: read

jobs:
  npm-audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # REPORT-ONLY for now (`|| true`): the tree has a pre-existing backlog of
      # advisories, almost entirely in dev/build tooling (metro, detox, ngrok, ws,
      # yaml) that is not shipped in the app bundle. Dependabot (see
      # .github/dependabot.yml) is the active remediation driver — it opens PRs to
      # bump vulnerable deps. Once the backlog is triaged (`npm audit fix` /
      # package.json "overrides"), drop the `|| true` to make this a hard gate.
      - name: Run npm audit (report-only)
        run: |
          echo "::group::npm audit --audit-level=high (all deps)"
          npm audit --audit-level=high || true
          echo "::endgroup::"
          echo "::group::npm audit --omit=dev (production deps only)"
          npm audit --omit=dev || true
          echo "::endgroup::"
