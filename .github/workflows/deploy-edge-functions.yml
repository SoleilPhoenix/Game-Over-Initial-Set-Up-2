name: Deploy Edge Functions

on:
  push:
    branches: [main]
    paths:
      - 'game-over-app/supabase/functions/**'

defaults:
  run:
    working-directory: game-over-app

jobs:
  deploy:
    name: Deploy to Supabase
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Check Supabase secrets
        id: secrets
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_PROJECT_ID" ]; then
            echo "::warning::Skipping edge function deploy — SUPABASE_ACCESS_TOKEN or SUPABASE_PROJECT_ID secret is not set."
            echo "::warning::To enable auto-deploy: Settings → Secrets and variables → Actions → add both secrets."
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy all edge functions
        if: steps.secrets.outputs.configured == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          supabase functions deploy create-payment-intent --project-ref "$SUPABASE_PROJECT_ID"
          supabase functions deploy stripe-webhook --project-ref "$SUPABASE_PROJECT_ID"
          supabase functions deploy send-email --project-ref "$SUPABASE_PROJECT_ID"
          supabase functions deploy send-push-notification --project-ref "$SUPABASE_PROJECT_ID"
          supabase functions deploy send-guest-invitations --project-ref "$SUPABASE_PROJECT_ID"
          supabase functions deploy send-final-briefing --project-ref "$SUPABASE_PROJECT_ID"
          supabase functions deploy process-payment-reminders --project-ref "$SUPABASE_PROJECT_ID"
