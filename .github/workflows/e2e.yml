name: E2E Tests (Detox)

# Manual trigger ONLY.
#
# Auto-runs on every push were costing 60-90 min of macOS minutes per commit
# while the app is still pre-launch and Solo-dev manually QAs on the simulator
# before TestFlight releases. Trigger this workflow explicitly from the GitHub
# Actions tab (Run workflow button) before App-Store submissions, after major
# refactors, or whenever a deep regression check is needed.
#
# To re-enable auto-runs on main: add `push: { branches: [main] }` below.
on:
  workflow_dispatch:

defaults:
  run:
    working-directory: game-over-app

# Disable Sentry source-map upload for E2E builds.
# Release builds normally upload source maps to Sentry, but CI runs without
# Sentry credentials — the auto-upload step then crashes on undefined env
# vars (see @sentry/react-native utils.ts:75 ‟Cannot read … 'match'‟).
env:
  SENTRY_DISABLE_AUTO_UPLOAD: 'true'
  # Reanimated v4's androidTest APK (worklets runtime + native libs for 4 ABIs)
  # overflows Gradle's default 2 GB heap during zipflinger ZIP construction.
  # 4 GB gives generous headroom on the GH 7 GB Linux runner.
  GRADLE_OPTS: '-Xmx4096m -XX:MaxMetaspaceSize=512m'

jobs:
  ios:
    name: E2E iOS (sim.ci)
    runs-on: macos-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: game-over-app/package-lock.json

      - name: Install applesimutils
        run: brew tap wix/brew && brew install applesimutils

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Prebuild iOS
        run: npx expo prebuild --platform ios --no-install

      - name: Install CocoaPods
        run: |
          cd ios
          rm -f Podfile.lock
          pod install --repo-update

      - name: Build app for Detox
        run: npx detox build --configuration ios.sim.ci

      - name: Run E2E tests
        run: npx detox test --configuration ios.sim.ci --headless --record-logs all --cleanup

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: detox-ios-artifacts
          path: game-over-app/artifacts/
          retention-days: 7

  android:
    name: E2E Android (emu.ci)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: game-over-app/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Prebuild Android
        run: npx expo prebuild --platform android --no-install

      - name: Bump Gradle daemon heap (reanimated APK packaging needs 4 GB)
        run: |
          # expo prebuild writes -Xmx2048m which is too small for the reanimated
          # androidTest APK zipflinger packaging. GRADLE_OPTS at the workflow
          # level only affects the launcher VM — the daemon reads gradle.properties.
          sed -i 's/-Xmx2048m/-Xmx4096m/g' android/gradle.properties
          grep org.gradle.jvmargs android/gradle.properties

      - name: Build app for Detox
        run: npx detox build --configuration android.emu.ci

      - name: Run E2E tests in emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          profile: pixel_7
          avd-name: Pixel_7_API_34
          force-avd-creation: true
          emulator-options: -no-window -no-snapshot -no-audio -gpu swiftshader_indirect
          disable-animations: true
          working-directory: game-over-app
          script: npx detox test --configuration android.emu.ci --headless --record-logs all --cleanup

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: detox-android-artifacts
          path: game-over-app/artifacts/
          retention-days: 7
