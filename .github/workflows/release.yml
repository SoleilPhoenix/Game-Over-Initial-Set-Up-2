name: Release (EAS Build + Submit)

# Triggered by version tags:
#   git tag v1.0.0 && git push --tags     → build + submit to stores
#   git tag v1.0.0-rc.1 && git push --tags → build only (no submit)
on:
  push:
    tags:
      - 'v*.*.*'

defaults:
  run:
    working-directory: game-over-app

jobs:
  build:
    name: EAS Build (production)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      tag: ${{ steps.tag.outputs.value }}
      is_prerelease: ${{ steps.tag.outputs.is_prerelease }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine release type
        id: tag
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          echo "value=$REF_NAME" >> "$GITHUB_OUTPUT"
          if [[ "$REF_NAME" == *-* ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: game-over-app/package-lock.json

      - name: Setup Expo + EAS
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build production for all platforms
        run: eas build --platform all --profile production --non-interactive --wait

  submit:
    name: EAS Submit (stores)
    needs: build
    if: needs.build.outputs.is_prerelease == 'false'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: game-over-app/package-lock.json

      - name: Setup Expo + EAS
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Submit latest production build to stores
        run: eas submit --platform all --profile production --latest --non-interactive

  github-release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.tag }}
          name: ${{ needs.build.outputs.tag }}
          prerelease: ${{ needs.build.outputs.is_prerelease }}
          generate_release_notes: true
