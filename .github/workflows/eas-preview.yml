name: EAS Preview Build

# Manual trigger only — preview builds cost EAS minutes. Run from
# Actions tab → "EAS Preview Build" → "Run workflow".
on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build for'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - ios
          - android

defaults:
  run:
    working-directory: game-over-app

jobs:
  preview:
    name: Build (${{ inputs.platform }})
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: game-over-app/package-lock.json

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build preview
        env:
          PLATFORM: ${{ inputs.platform }}
        run: eas build --platform "$PLATFORM" --profile preview --non-interactive --no-wait
